<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>👾 볼프강의 게임메모리 - MOTHER 3 👾</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        #game { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js"></script>
    <script>
        window.onload = function() {
            new EmuJS("#game", {
                core: "gba",
                // 🛡️ 캐시 문제를 방지하기 위해 주소 뒤에 랜덤 번호를 붙였습니다. (반영 즉시 확인용)
                gameUrl: "https://media.githubusercontent.com/media/jsjrkang-hue/AOF/master/MT3.gba?v=" + new Date().getTime(),
                dataUrl: "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/",
                active: true,
                autoStart: true
            });
        };
    </script>
</body>
</html>
