<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👾 볼프강의 게임메모리 - MOTHER 3 👾</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; display: flex; align-items: center; justify-content: center; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js"></script>
    <script>
        window.onload = function() {
            new EmuJS("#game-container", {
                core: "gba",
                // 🛡️ 파일명을 소문자/대문자 확실히 구분하여 전체 경로로 수정했습니다.
                gameUrl: "https://raw.githubusercontent.com/jsjrkang-hue/AOF/main/MT3.gba",
                dataUrl: "https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/",
                active: true,
                autoStart: true,
                style: "width:100%; height:100%;"
            });
        };
    </script>
</body>
</html>
